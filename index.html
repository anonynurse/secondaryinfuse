<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secondary Infusion</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; padding:16px; }
    #page { margin:auto; width:100%; max-width:900px; }
    .row { display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .col { display:flex; align-items:center; gap:8px; }
    button { padding:10px 14px; border:1px solid #ccc; border-radius:8px; background:#f6f6f6; cursor:pointer; }
    button:hover { background:#eee; }
    textarea { width:100%; height:60vh; font-size:5pt; }
    input[type="text"] { width:6ch; text-align:center; }
    .small { font-size:12px; color:#666; }
  </style>
</head>
<body>
  <div id="page">
    <div class="row" style="margin-bottom:8px;">
      <div class="col" style="flex:1;">
        <button id="play" style="flex:1;">Play</button>
      </div>
      <div class="col" style="flex:1; justify-content:flex-end;">
        <button id="step" style="flex:1;">Step</button>
      </div>
    </div>

    <div class="row" style="margin-bottom:8px;">
      <div class="col">
        <button id="scorebtn">mistake</button>
        <input id="score" type="text" value="0" read-only>
      </div>
      <div class="col">
        <input type="checkbox" id="soundCheckbox" checked>
        <label for="soundCheckbox">sound</label>
        <span class="small" id="status"></span>
      </div>
    </div>
  </br>
    <div id="txtarea">
      <textarea id="textArea">
Review chart, orders and mar
Order is complete, dated, and signed 
MAR matches orders
Enter room - bring chart, gloves
Hand hygiene
Intro (self, role)
Patient verification - name, DOB - verbalized, chart, bracelet
ask allergies
Explain orders, purpose and action of medication, obtain consent 
put on gloves
Assess IV site
   Dressing dry and intact
   No leaking
   Redness, pain, swelling
Assess primary line
   No warnings/alarms on pump
   Drip is visible in chamber, *correct solution and rate
Hand hygiene, leave room
Prepare medication
   Select correct medication, matches order in chart/MAR
   *** Stop - Med rights: compare to chart/MAR - patient, med, dose, time/freq, route, reason *** 
   Look in chart to determine infusion time compare with order
   Confirm compatibility
   Look over potential administration hazards
   Calculate infusion rate in mL/h
   *** Stop - Med rights, compare to chart/MAR - patient, med, dose, flow rate, time/freq, route, reason *** 
    Prepare IV tubing label; time, date, initials
Prime and connect secondary set and administer medication
   Hand hygiene and enter room, bring medication, chart, secondary tubing and label, alcohol swab
   Open tubing and lower primary bag using blue hook in package
   Hang medication bag on other hook of pole and remove blue cap
   Remove secondary line and close roller clamp
   Spike medication bag, maintaining sterility
   Fill drip chamber to line, ~1/2 full
   Slowly open clamp and allow tubing to fill without wasting medication
   Check for air bubbles and tap any out
   *** Stop - Med rights, compare to chart/MAR - patient, med, dose, flow rate, time/freq, route, reason *** 
   Clean upper injection Y-port on primary tubing with alcohol swab (30 sec clean, 30 sec dry)
   Attach secondary line to primary line maintaining sterility, label secondary line
   Program pump
      ensure primary bag is lowered and secondary tubing is connected correctly
      Press RUN/STOP
      Press program pri/sec
      Press program secondary
      Key in first two letters of medication
      Scroll to correct medication - OK
      Scroll to select correct concentration - OK
      Select yes on confirmation screen if information is correct
      Press exit if clinical advisory comes up (just saying it’s premixed)
      Enter infusion time - OK
      Select yes for callback at end of secondary infusion
      Press RUN/STOP
      Validate drops are falling into secondary drip chamber and not primary
      press yes
      Secondary bag is now infusing
Wrap up
Check that secondary med is dripping into chamber and primary line is not
Remind patient of call bell
Hand hygiene, leave room
Verbalize that documentation would be done according to facility polity
      </textarea>
    </div>
  </div>

  <audio id="ttsAudio" preload="auto"></audio>

  <script>
    // Replace with your Worker URL:
    const WORKER_URL = "https://postpartum-tts.chris8331.workers.dev/api/tts"; 
    const VOICE = "en-US-JennyNeural";
    const FORMAT = "audio-24khz-48kbitrate-mono-mp3";

    let lines = [];
    let index = 0;
    let playing = false;

    const playBtn = document.getElementById("play");
    const stepBtn = document.getElementById("step");
    const scoreBtn = document.getElementById("scorebtn");
    const scoreInput = document.getElementById("score");
    const textArea = document.getElementById("textArea");
    const soundCheckbox = document.getElementById("soundCheckbox");
    const audioEl = document.getElementById("ttsAudio");
    const statusEl = document.getElementById("status");

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    async function speak(text) {
      if (!soundCheckbox.checked || !text.trim()) return;

      // Try Cloud TTS
      try {
        setStatus("cloud TTS…");
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, voice: VOICE, format: FORMAT })
        });
        if (!res.ok) throw new Error(await res.text());
        const blob = await res.blob();
        if (blob.size < 2000) throw new Error("Empty audio");
        audioEl.src = URL.createObjectURL(blob);
        await audioEl.play();
        setStatus("");
        return; // success
      } catch (err) {
        console.warn("Cloud TTS failed, falling back:", err);
        setStatus("cloud TTS failed → local voice");
      }

      // Fallback: browser speechSynthesis
      try {
        const utter = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        utter.voice = voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en")) || null;
        utter.rate = 1.0;
        utter.pitch = 1.0;
        speechSynthesis.speak(utter);
      } catch (err) {
        console.error("Local TTS also failed:", err);
        setStatus("all TTS failed");
      }
    }

    playBtn.addEventListener("click", function() {
      if (playing) return;
      playing = true;
      lines = textArea.value.split("\n");
      textArea.value = "";
      index = 0;
      playLines();
    });

    stepBtn.addEventListener("click", function() {
      if (index === 0) {
        lines = textArea.value.split("\n");
        textArea.value = "";
      }
      if (index <= lines.length && index !== 0) {
        const line = lines[index - 1];
        textArea.value += line + "\n";
        textArea.scrollTop = textArea.scrollHeight;
        speak(line);
      }
      index++;
    });

    scoreBtn.addEventListener("click", function() {
      scoreInput.value = parseInt(scoreInput.value, 10) + 1;
      textArea.value += "*** ^ ***\n";
    });

    function playLines() {
      if (index >= lines.length) {
        playing = false;
        return;
      }
      const line = lines[index];
      textArea.value += line + "\n";
      textArea.scrollTop = textArea.scrollHeight;
      speak(line);
      index++;
      setTimeout(playLines, 3000);
    }
  </script>
</body>
</html>
